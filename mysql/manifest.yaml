apiVersion: v1
kind: Service
metadata:
  name: mysql-hls
  namespace: expense
spec:
  clusterIP: None
  selector:
    component: mysql
    project: expense
    tier: db
  ports:
  - protocol: TCP
    port: 3306 #service port
    targetPort: 3306 #target port
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-svc
  namespace: expense
spec:
  selector:
    component: mysql
    project: expense
    tier: db
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306

---
