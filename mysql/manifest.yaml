---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: expense
spec:
  selector:
    matchLabels:
      component: mysql
      project: expense
      tier: db # has to match .spec.template.metadata.labels
  replicas: 2 # by default is 1
  template:
    metadata:
      labels:
        component: mysql
        project: expense
        tier: db
       # has to match .spec.selector.matchLabels
    spec:
      containers:
      - name: mysql
        image: avinbandela/mysql:v1.0
        volumeMounts:
        - name: mysql
          mountPath: /var/lib/mysql
      # volumes:
      # - name: mysql
      #   persistentVolumeClaim:
      #     claimName: mysql
  # pvc declaration, it is mandatory
  volumeClaimTemplates:
  - metadata:
      name: mysql
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "ebs-expense-sc"
      resources:
        requests:
          storage: 1Gi
